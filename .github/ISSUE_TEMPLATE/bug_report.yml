name: Bug report
description: Report a reproducible bug in kfc-procedure
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide a minimal reproducible example.
  - type: input
    id: version
    attributes:
      label: kfc-procedure version
      description: Example: 0.1.1
      placeholder: "0.1.1"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.8"
    validations:
      required: true
  - type: dropdown
    id: task-type
    attributes:
      label: Task type
      options:
        - Regression
        - Classification
        - COBRA aggregation
        - Documentation
        - Packaging / installation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Explain what happened.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproducible example
      description: Paste code that reproduces the problem.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior or traceback
      render: text
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add screenshots, links, or notes if useful.
    validations:
      required: false
